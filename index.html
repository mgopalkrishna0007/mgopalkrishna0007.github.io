<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            width: 80%;
            margin: auto;
            text-align: center;
            padding: 20px;
        }
        .header {
            background-color: #222;
            color: white;
            padding: 20px;
            font-size: 24px;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .nav a {
            text-decoration: none;
            color: #007bff;
            font-size: 18px;
        }
        .content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .footer {
            margin-top: 20px;
            padding: 10px;
            background: #222;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">Welcome to My Website</div>
    <div class="container">
        <div class="nav">
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </div>
        <div class="content">
            <h2 id="about">About Me</h2>
            <p>Hello! I'm a passionate developer working on innovative projects.</p>
            
            <h2 id="projects">Projects</h2>
            <p>Check out my latest work in AI, web development, and embedded systems.</p>
            
            <h2 id="contact">Contact</h2>
            <p>Email me at example@example.com</p>
        </div>
    </div>
    <div class="footer">&copy; 2025 My Website</div>
</body>
</html>
